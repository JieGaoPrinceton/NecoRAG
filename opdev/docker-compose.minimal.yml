# 最小配置 - 仅核心存储
# 使用方式：cd opdev && docker compose -f docker-compose.minimal.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: necorag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - necorag-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: necorag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - necorag-net

volumes:
  redis_data:
  qdrant_data:

networks:
  necorag-net:
    driver: bridge
