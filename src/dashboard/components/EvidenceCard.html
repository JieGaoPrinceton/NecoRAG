<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证据来源可视化卡片</title>
    <style>
        .evidence-container {
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .evidence-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #28a745;
        }
        
        .evidence-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        
        .evidence-summary {
            display: flex;
            gap: 30px;
        }
        
        .summary-item {
            text-align: center;
        }
        
        .summary-value {
            font-size: 20px;
            font-weight: bold;
            color: #28a745;
        }
        
        .summary-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }
        
        .evidence-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        
        .filter-select {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background: white;
        }
        
        .evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .evidence-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .evidence-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .card-high-quality {
            border-color: #28a745;
            box-shadow: 0 0 0 1px #28a745, 0 2px 8px rgba(40, 167, 69, 0.2);
        }
        
        .card-medium-quality {
            border-color: #ffc107;
        }
        
        .card-low-quality {
            border-color: #dc3545;
        }
        
        .card-header {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        
        .card-source {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .source-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .source-vector {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .source-graph {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        
        .source-hyde {
            background: #e8f5e8;
            color: #388e3c;
        }
        
        .source-web {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .quality-score {
            font-size: 14px;
            font-weight: 600;
        }
        
        .quality-high {
            color: #28a745;
        }
        
        .quality-medium {
            color: #ffc107;
        }
        
        .quality-low {
            color: #dc3545;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin: 0 0 8px 0;
            line-height: 1.3;
        }
        
        .card-content {
            padding: 15px;
        }
        
        .content-snippet {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 15px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .content-full {
            display: none;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .action-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: #f8f9fa;
            border-color: #007bff;
        }
        
        .action-btn.primary {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        
        .action-btn.primary:hover {
            background: #0056b3;
        }
        
        .relevance-bar {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .relevance-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .relevance-high {
            background: linear-gradient(90deg, #28a745, #20c997);
        }
        
        .relevance-medium {
            background: linear-gradient(90deg, #ffc107, #ff9800);
        }
        
        .relevance-low {
            background: linear-gradient(90deg, #dc3545, #e91e63);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .sort-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .sort-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .sort-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .page-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .page-btn:hover:not(.disabled) {
            background: #f8f9fa;
        }
        
        .page-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        
        .page-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-info {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="evidence-container">
        <div class="evidence-header">
            <h2 class="evidence-title">证据来源可视化</h2>
            <div class="evidence-summary">
                <div class="summary-item">
                    <div class="summary-value" id="totalCount">0</div>
                    <div class="summary-label">总证据</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="highQualityCount">0</div>
                    <div class="summary-label">高质量</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="avgRelevance">0.00</div>
                    <div class="summary-label">平均相关度</div>
                </div>
            </div>
        </div>
        
        <div class="evidence-filters">
            <div class="filter-group">
                <label class="filter-label">来源:</label>
                <select class="filter-select" id="sourceFilter">
                    <option value="all">全部</option>
                    <option value="vector">向量检索</option>
                    <option value="graph">图谱检索</option>
                    <option value="hyde">HyDE</option>
                    <option value="web">网络搜索</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label class="filter-label">质量:</label>
                <select class="filter-select" id="qualityFilter">
                    <option value="all">全部</option>
                    <option value="high">高质量 (≥0.8)</option>
                    <option value="medium">中等 (0.5-0.8)</option>
                    <option value="low">低质量 (<0.5)</option>
                </select>
            </div>
        </div>
        
        <div class="sort-controls">
            <button class="sort-btn active" data-sort="relevance">按相关度排序</button>
            <button class="sort-btn" data-sort="time">按时间排序</button>
            <button class="sort-btn" data-sort="source">按来源排序</button>
        </div>
        
        <div class="evidence-grid" id="evidenceGrid">
            <div class="empty-state">
                <div class="empty-state-icon">📚</div>
                <p>暂无证据数据</p>
                <p style="font-size: 14px; margin-top: 10px;">开始检索以查看证据来源</p>
            </div>
        </div>
        
        <div class="pagination" id="pagination">
            <button class="page-btn" id="prevPage">上一页</button>
            <span class="page-info" id="pageInfo">第 1 页，共 1 页</span>
            <button class="page-btn" id="nextPage">下一页</button>
        </div>
    </div>

    <script>
        class EvidenceViewer {
            constructor(containerId) {
                this.container = document.getElementById(containerId || 'evidenceGrid');
                this.evidence = [];
                this.filteredEvidence = [];
                this.currentPage = 1;
                this.pageSize = 12;
                this.sortBy = 'relevance';
                this.sourceFilter = 'all';
                this.qualityFilter = 'all';
                this.sessionId = null;
            }
            
            // 设置会话ID并开始监听
            setSession(sessionId) {
                this.sessionId = sessionId;
                this.connectWebSocket();
                this.loadEvidenceData();
            }
            
            // 连接WebSocket
            connectWebSocket() {
                if (!this.sessionId) return;
                
                const wsUrl = `ws://${window.location.host}/api/debug/ws/thinking-path/${this.sessionId}`;
                this.ws = new WebSocket(wsUrl);
                
                this.ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === 'session_update') {
                        this.updateFromSession(data.data);
                    }
                };
            }
            
            // 从会话数据更新
            updateFromSession(sessionData) {
                this.evidence = sessionData.evidence_sources || [];
                this.applyFilters();
                this.renderEvidence();
                this.updateSummary();
            }
            
            // 加载证据数据
            async loadEvidenceData() {
                if (!this.sessionId) return;
                
                try {
                    const response = await fetch(`/api/debug/sessions/${this.sessionId}`);
                    const sessionData = await response.json();
                    this.updateFromSession(sessionData);
                } catch (error) {
                    console.error('加载证据数据失败:', error);
                }
            }
            
            // 应用过滤器
            applyFilters() {
                this.filteredEvidence = this.evidence.filter(evidence => {
                    // 来源过滤
                    if (this.sourceFilter !== 'all' && evidence.source !== this.sourceFilter) {
                        return false;
                    }
                    
                    // 质量过滤
                    if (this.qualityFilter !== 'all') {
                        const isHigh = evidence.relevance_score >= 0.8;
                        const isMedium = evidence.relevance_score >= 0.5 && evidence.relevance_score < 0.8;
                        const isLow = evidence.relevance_score < 0.5;
                        
                        switch (this.qualityFilter) {
                            case 'high':
                                if (!isHigh) return false;
                                break;
                            case 'medium':
                                if (!isMedium) return false;
                                break;
                            case 'low':
                                if (!isLow) return false;
                                break;
                        }
                    }
                    
                    return true;
                });
                
                // 排序
                this.sortEvidence();
            }
            
            // 排序证据
            sortEvidence() {
                this.filteredEvidence.sort((a, b) => {
                    switch (this.sortBy) {
                        case 'relevance':
                            return b.relevance_score - a.relevance_score;
                        case 'time':
                            return new Date(b.retrieval_time) - new Date(a.retrieval_time);
                        case 'source':
                            return a.source.localeCompare(b.source);
                        default:
                            return 0;
                    }
                });
            }
            
            // 渲染证据卡片
            renderEvidence() {
                const startIndex = (this.currentPage - 1) * this.pageSize;
                const endIndex = startIndex + this.pageSize;
                const pageEvidence = this.filteredEvidence.slice(startIndex, endIndex);
                
                if (pageEvidence.length === 0) {
                    this.container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <p>没有符合条件的证据</p>
                            <p style="font-size: 14px; margin-top: 10px;">请调整过滤条件</p>
                        </div>
                    `;
                    this.updatePagination();
                    return;
                }
                
                const cardsHtml = pageEvidence.map(evidence => this.renderCard(evidence)).join('');
                this.container.innerHTML = cardsHtml;
                this.updatePagination();
            }
            
            // 渲染单个卡片
            renderCard(evidence) {
                const qualityClass = this.getQualityClass(evidence.relevance_score);
                const sourceClass = `source-${evidence.source}`;
                const relevancePercent = Math.round(evidence.relevance_score * 100);
                const relevanceFillClass = this.getRelevanceClass(evidence.relevance_score);
                
                // 截取内容片段
                const snippet = evidence.content.length > 200 
                    ? evidence.content.substring(0, 200) + '...'
                    : evidence.content;
                
                return `
                    <div class="evidence-card ${qualityClass}" data-evidence-id="${evidence.evidence_id}">
                        <div class="card-header">
                            <div class="card-source">
                                <span class="source-badge ${sourceClass}">${this.getSourceLabel(evidence.source)}</span>
                                <span class="quality-score ${qualityClass.replace('card-', 'quality-')}">
                                    ${evidence.relevance_score.toFixed(2)}
                                </span>
                            </div>
                            <h3 class="card-title">${evidence.content.substring(0, 60)}${evidence.content.length > 60 ? '...' : ''}</h3>
                        </div>
                        
                        <div class="card-content">
                            <div class="content-snippet">${snippet}</div>
                            
                            <div class="relevance-bar">
                                <div class="relevance-fill ${relevanceFillClass}" style="width: ${relevancePercent}%"></div>
                            </div>
                            
                            <div class="card-actions">
                                <button class="action-btn primary" onclick="showFullContent('${evidence.evidence_id}')">
                                    查看全文
                                </button>
                                <button class="action-btn" onclick="viewSource('${evidence.evidence_id}')">
                                    查看来源
                                </button>
                            </div>
                            
                            <div class="card-meta">
                                <div class="meta-item">
                                    <span>⏱️</span>
                                    <span>${new Date(evidence.retrieval_time).toLocaleTimeString()}</span>
                                </div>
                                <div class="meta-item">
                                    <span>🔗</span>
                                    <span>ID: ${evidence.evidence_id.substring(0, 8)}...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // 获取质量类别CSS类
            getQualityClass(score) {
                if (score >= 0.8) return 'card-high-quality';
                if (score >= 0.5) return 'card-medium-quality';
                return 'card-low-quality';
            }
            
            // 获取相关度CSS类
            getRelevanceClass(score) {
                if (score >= 0.8) return 'relevance-high';
                if (score >= 0.5) return 'relevance-medium';
                return 'relevance-low';
            }
            
            // 获取来源标签
            getSourceLabel(source) {
                const labels = {
                    'vector': '向量检索',
                    'graph': '图谱检索',
                    'hyde': 'HyDE',
                    'web': '网络搜索'
                };
                return labels[source] || source;
            }
            
            // 更新摘要统计
            updateSummary() {
                const totalCount = this.evidence.length;
                const highQualityCount = this.evidence.filter(e => e.relevance_score >= 0.8).length;
                const avgRelevance = totalCount > 0 
                    ? (this.evidence.reduce((sum, e) => sum + e.relevance_score, 0) / totalCount).toFixed(2)
                    : '0.00';
                
                document.getElementById('totalCount').textContent = totalCount;
                document.getElementById('highQualityCount').textContent = highQualityCount;
                document.getElementById('avgRelevance').textContent = avgRelevance;
            }
            
            // 更新分页
            updatePagination() {
                const totalPages = Math.ceil(this.filteredEvidence.length / this.pageSize);
                const hasNext = this.currentPage < totalPages;
                const hasPrev = this.currentPage > 1;
                
                document.getElementById('prevPage').classList.toggle('disabled', !hasPrev);
                document.getElementById('nextPage').classList.toggle('disabled', !hasNext);
                document.getElementById('pageInfo').textContent = 
                    `第 ${this.currentPage} 页，共 ${totalPages || 1} 页`;
            }
            
            // 切换页面
            goToPage(page) {
                const totalPages = Math.ceil(this.filteredEvidence.length / this.pageSize);
                if (page >= 1 && page <= totalPages) {
                    this.currentPage = page;
                    this.renderEvidence();
                }
            }
            
            // 设置排序方式
            setSort(sortBy) {
                this.sortBy = sortBy;
                this.applyFilters();
                this.renderEvidence();
                
                // 更新按钮状态
                document.querySelectorAll('.sort-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
            }
            
            // 设置过滤器
            setFilter(type, value) {
                if (type === 'source') {
                    this.sourceFilter = value;
                } else if (type === 'quality') {
                    this.qualityFilter = value;
                }
                
                this.currentPage = 1; // 重置到第一页
                this.applyFilters();
                this.renderEvidence();
            }
        }
        
        // 全局实例和函数
        let evidenceViewer;
        
        function initEvidenceViewer() {
            evidenceViewer = new EvidenceViewer('evidenceGrid');
            
            // 绑定事件监听器
            document.getElementById('sourceFilter').addEventListener('change', (e) => {
                evidenceViewer.setFilter('source', e.target.value);
            });
            
            document.getElementById('qualityFilter').addEventListener('change', (e) => {
                evidenceViewer.setFilter('quality', e.target.value);
            });
            
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    evidenceViewer.setSort(e.target.dataset.sort);
                });
            });
            
            document.getElementById('prevPage').addEventListener('click', () => {
                evidenceViewer.goToPage(evidenceViewer.currentPage - 1);
            });
            
            document.getElementById('nextPage').addEventListener('click', () => {
                evidenceViewer.goToPage(evidenceViewer.currentPage + 1);
            });
            
            // 这里可以设置会话ID
            // evidenceViewer.setSession('your-session-id');
        }
        
        // 查看全文
        function showFullContent(evidenceId) {
            const evidence = evidenceViewer.evidence.find(e => e.evidence_id === evidenceId);
            if (evidence) {
                alert(`证据全文:\n\n${evidence.content}`);
            }
        }
        
        // 查看来源
        function viewSource(evidenceId) {
            const evidence = evidenceViewer.evidence.find(e => e.evidence_id === evidenceId);
            if (evidence && evidence.source_url) {
                window.open(evidence.source_url, '_blank');
            } else {
                alert('该证据没有可用的来源链接');
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initEvidenceViewer);
    </script>
</body>
</html>
